<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой КБЖУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
            padding-bottom: 20px;
        }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-label { font-size: 12px; opacity: 0.6; margin-bottom: 6px; }
        .stat-value { font-size: 22px; font-weight: bold; }
        .stat-sub { font-size: 12px; opacity: 0.5; margin-top: 4px; }
        .progress-section {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .progress-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .progress-bar { height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 5px; transition: width 0.5s; }
        .progress-fill.green { background: #28a745; }
        .progress-fill.yellow { background: #ffc107; }
        .progress-fill.red { background: #dc3545; }
        .loading { text-align: center; padding: 40px; opacity: 0.5; }
        .error { text-align: center; padding: 20px; color: #dc3545; }
        .date { font-size: 14px; opacity: 0.6; margin-top: 8px; }
        .no-profile { text-align: center; padding: 40px 20px; }
        .emoji { font-size: 48px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Мой КБЖУ</h1>
        <div id="date" class="date">Загрузка...</div>
    </div>

    <div id="content">
        <div class="loading">Загрузка данных...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const API_URL = 'http://159.194.217.106:8080/api/stats';
        const userId = tg.initDataUnsafe?.user?.id;

        document.getElementById('date').textContent = new Date().toLocaleDateString('ru-RU', {
            weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
        });

        async function loadStats() {
            if (!userId) {
                document.getElementById('content').innerHTML = '<div class="error">Ошибка: не удалось получить ID пользователя</div>';
                return;
            }

            try {
                const response = await fetch(`${API_URL}?user_id=${userId}`);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('content').innerHTML = '<div class="error">Ошибка загрузки данных</div>';
                    return;
                }

                if (!data.has_profile) {
                    document.getElementById('content').innerHTML = `
                        <div class="no-profile">
                            <div class="emoji">👤</div>
                            <div style="font-size: 18px; margin-bottom: 10px;">Профиль не настроен</div>
                            <div style="opacity: 0.6; font-size: 14px;">Напиши боту /start и настрой профиль, чтобы видеть статистику</div>
                        </div>
                    `;
                    return;
                }

                const calPercent = Math.min(Math.round((data.calories / data.calories_limit) * 100), 100);
                const protPercent = Math.min(Math.round((data.protein / data.protein_limit) * 100), 100);
                const fatPercent = Math.min(Math.round((data.fat / data.fat_limit) * 100), 100);
                const carbPercent = Math.min(Math.round((data.carbs / data.carbs_limit) * 100), 100);

                function getProgressClass(percent) {
                    if (percent < 80) return 'green';
                    if (percent < 100) return 'yellow';
                    return 'red';
                }

                document.getElementById('content').innerHTML = `
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-label">🔥 Калории</div>
                            <div class="stat-value">${data.calories}</div>
                            <div class="stat-sub">из ${data.calories_limit}</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🥩 Белки</div>
                            <div class="stat-value">${data.protein}г</div>
                            <div class="stat-sub">из ${data.protein_limit}г</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🥑 Жиры</div>
                            <div class="stat-value">${data.fat}г</div>
                            <div class="stat-sub">из ${data.fat_limit}г</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-label">🍞 Углеводы</div>
                            <div class="stat-value">${data.carbs}г</div>
                            <div class="stat-sub">из ${data.carbs_limit}г</div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>🔥 Калории</span>
                            <span>${calPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${getProgressClass(calPercent)}" style="width: ${calPercent}%"></div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>🥩 Белки</span>
                            <span>${protPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${getProgressClass(protPercent)}" style="width: ${protPercent}%"></div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>🥑 Жиры</span>
                            <span>${fatPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${getProgressClass(fatPercent)}" style="width: ${fatPercent}%"></div>
                        </div>
                    </div>

                    <div class="progress-section">
                        <div class="progress-header">
                            <span>🍞 Углеводы</span>
                            <span>${carbPercent}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill ${getProgressClass(carbPercent)}" style="width: ${carbPercent}%"></div>
                        </div>
                    </div>
                `;
            } catch (e) {
                document.getElementById('content').innerHTML = '<div class="error">Не удалось загрузить данные</div>';
            }
        }

        loadStats();
    </script>
</body>
</html>
