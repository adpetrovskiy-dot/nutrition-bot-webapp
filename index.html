<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой КБЖУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #f5f5f5);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
            padding-bottom: 20px;
        }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { font-size: 24px; margin-bottom: 4px; }
        .header p { opacity: 0.6; font-size: 14px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
        .input-group { margin-bottom: 12px; }
        .input-label { font-size: 13px; opacity: 0.7; margin-bottom: 4px; }
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn-green { background: #28a745; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
        .stat-card {
            background: var(--tg-theme-secondary-bg-color, #fff);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-label { font-size: 12px; opacity: 0.6; margin-bottom: 6px; }
        .stat-value { font-size: 22px; font-weight: bold; }
        .hidden { display: none; }
        .back-btn {
            background: transparent;
            border: none;
            color: var(--tg-theme-button-color, #3390ec);
            font-size: 14px;
            margin-bottom: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="main-menu">
        <div class="header">
            <h1>📱 Мой КБЖУ</h1>
            <p id="date">Сегодня</p>
        </div>

        <div class="card">
            <div class="card-title">📊 Статистика</div>
            <button class="btn btn-green" onclick="showStats()">Посмотреть статистику</button>
        </div>

        <div class="card">
            <div class="card-title">🍽 Добавить еду</div>
            <button class="btn" onclick="showAddFood()">Через бота</button>
            <button class="btn btn-green" onclick="showManualInput()">Ручной ввод КБЖУ</button>
        </div>
    </div>

    <div id="manual-input" class="hidden">
        <button class="back-btn" onclick="goBack()">← Назад</button>
        <div class="header">
            <h1>Ручной ввод</h1>
        </div>

        <div class="card">
            <div class="card-title">Введите КБЖУ</div>
            <div class="grid-2">
                <div class="input-group">
                    <div class="input-label">🔥 Калории</div>
                    <input type="number" id="calories" class="input-field" placeholder="0">
                </div>
                <div class="input-group">
                    <div class="input-label">🥩 Белки (г)</div>
                    <input type="number" id="protein" class="input-field" placeholder="0">
                </div>
                <div class="input-group">
                    <div class="input-label">🥑 Жиры (г)</div>
                    <input type="number" id="fat" class="input-field" placeholder="0">
                </div>
                <div class="input-group">
                    <div class="input-label">🍞 Углеводы (г)</div>
                    <input type="number" id="carbs" class="input-field" placeholder="0">
                </div>
            </div>
            <button class="btn btn-green" onclick="submitManual()">Сохранить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        document.getElementById('date').textContent = new Date().toLocaleDateString('ru-RU', {
            weekday: 'long', day: 'numeric', month: 'long'
        });

        function showStats() {
            tg.sendData('get_stats');
            tg.close();
        }

        function showAddFood() {
            tg.sendData('add_food');
            tg.close();
        }

        function showManualInput() {
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('manual-input').classList.remove('hidden');
        }

        function goBack() {
            document.getElementById('main-menu').classList.remove('hidden');
            document.getElementById('manual-input').classList.add('hidden');
        }

        function submitManual() {
            const calories = document.getElementById('calories').value || '0';
            const protein = document.getElementById('protein').value || '0';
            const fat = document.getElementById('fat').value || '0';
            const carbs = document.getElementById('carbs').value || '0';

            const data = `manual_food:${calories}:${protein}:${fat}:${carbs}`;
            tg.sendData(data);
            tg.close();
        }
    </script>
</body>
</html>
