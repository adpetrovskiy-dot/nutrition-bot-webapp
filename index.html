<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой КБЖУ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            padding: 16px;
        }
        .header {
            text-align: center;
            padding: 20px 0;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .card-value {
            font-size: 28px;
            font-weight: bold;
        }
        .progress {
            height: 8px;
            background: var(--tg-theme-hint-color, #ccc);
            border-radius: 4px;
            margin-top: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--tg-theme-button-color, #3390ec);
            border-radius: 4px;
            transition: width 0.3s;
        }
        .macros {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .macro-item {
            text-align: center;
            padding: 12px;
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 8px;
        }
        .macro-label {
            font-size: 12px;
            opacity: 0.7;
        }
        .macro-value {
            font-size: 18px;
            font-weight: bold;
            margin-top: 4px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #fff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            margin-top: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function requestStats() {
            tg.sendData('get_stats');
            tg.close();
        }

        function addFood() {
            tg.sendData('add_food');
            tg.close();
        }

        // Показываем приветствие без фейковых данных
        document.getElementById('app').innerHTML = `
            <div class="header">
                <h1>📱 Мой КБЖУ</h1>
                <p style="opacity: 0.7">Быстрый доступ к функциям</p>
            </div>

            <div class="card">
                <div class="card-title">💡 Как пользоваться</div>
                <p style="line-height: 1.6">
                    Данные обновляются в реальном времени через бота.
                    Нажмите кнопку ниже, чтобы получить актуальную статистику.
                </p>
            </div>

            <button class="btn" onclick="requestStats()" style="background: #28a745;">
                📊 Получить статистику
            </button>

            <button class="btn" onclick="addFood()">
                🍽 Добавить еду
            </button>

            <div style="margin-top: 20px; text-align: center; opacity: 0.6; font-size: 12px;">
                Бот: @${tg.initDataUnsafe?.user?.username || 'ваш бот'}
            </div>
        `;
    </script>
</body>
</html>
